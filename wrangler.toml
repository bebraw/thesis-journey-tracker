name = "thesis-journey-tracker"
main = "src/worker.ts"
compatibility_date = "2026-03-22"

[build]
command = "npm run build:css"
watch_dir = "src"

[[rules]]
type = "Text"
globs = ["**/*.css"]
fallthrough = true

[[rules]]
type = "Data"
globs = ["**/*.ico"]
fallthrough = true

[[d1_databases]]
binding = "DB"
database_name = "thesis-journey-tracker"
database_id = "33243c3d-4b68-47c7-91f8-f3d432dc887b"
migrations_dir = "migrations"

[triggers]
crons = ["30 1 * * *"]

[[r2_buckets]]
binding = "BACKUP_BUCKET"
bucket_name = "thesis-journey-tracker-backup"

[vars]
BACKUP_PREFIX = "automated-backups"
