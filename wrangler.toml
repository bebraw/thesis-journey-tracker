name = "thesis-journey-tracker"
main = "src/worker.ts"
compatibility_date = "2026-03-22"

[build]
command = "npm run build:css"
watch_dir = "src"

[[rules]]
type = "Text"
globs = ["**/*.css"]
fallthrough = true

[[rules]]
type = "Data"
globs = ["**/*.ico"]
fallthrough = true

[[d1_databases]]
binding = "DB"
database_name = "thesis_tracker_db"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"
migrations_dir = "migrations"

[triggers]
crons = ["30 1 * * *"]

[[r2_buckets]]
binding = "BACKUP_BUCKET"
bucket_name = "replace-with-your-r2-backup-bucket"

[vars]
BACKUP_PREFIX = "automated-backups"
