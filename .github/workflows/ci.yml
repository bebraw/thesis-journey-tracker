name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-fast:
    runs-on: ubuntu-latest
    container:
      image: node:24.18.0-bookworm@sha256:392e1e23f34da768d8d1f4e502b64f200d3be3465934d4b7930f57d7e2fc1989
    steps:
      - uses: actions/checkout@v4

      - name: Validate repository shape
        shell: bash
        run: |
          set -euo pipefail
          test -f README.md
          test -f AGENTS.md
          test -f package.json
          test -f package-lock.json
          test -f .dev.vars.example
          test -f .env.agent-ci.example
          test -f .nvmrc

      - name: Install dependencies
        id: install
        shell: bash
        run: npm ci

      - name: Run fast quality gate
        shell: bash
        run: npm run quality:gate:fast

  quality-browser:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
      options: --ipc=host
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm

      - name: Install dependencies
        shell: bash
        run: npm ci

      - name: Run browser quality gate
        shell: bash
        run: npm run e2e && npm run lighthouse
